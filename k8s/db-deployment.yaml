apiVersion: v1
kind: ConfigMap
metadata:
  name: wallet-db-schema
data:
  schema.sql: |
    -- DBT Wallet Module Database Schema (MySQL 8)
    -- Focus: ACID, Ledger Integrity (Double-Entry), and Triggers

    CREATE TABLE IF NOT EXISTS accounts (
        id CHAR(36) PRIMARY KEY,
        owner_name VARCHAR(255) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS audit_logs (
        id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY,
        table_name VARCHAR(50),
        record_id BIGINT UNSIGNED,
        action VARCHAR(50),
        new_data JSON,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS transaction_refs (
        reference_id VARCHAR(255) PRIMARY KEY,
        transaction_kind VARCHAR(50) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS ledger (
        id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT,
        account_id CHAR(36) NOT NULL,
        amount DECIMAL(15, 2) NOT NULL,
        transaction_type VARCHAR(50) NOT NULL,
        reference_id VARCHAR(255),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (id),
        CONSTRAINT fk_ledger_account FOREIGN KEY (account_id) REFERENCES accounts(id)
    );

    CREATE INDEX idx_ledger_account_id ON ledger (account_id);
    CREATE INDEX idx_ledger_reference_id ON ledger (reference_id);

    DROP TRIGGER IF EXISTS trigger_ledger_audit;

    CREATE TRIGGER trigger_ledger_audit
    AFTER INSERT ON ledger
    FOR EACH ROW
    INSERT INTO audit_logs (table_name, record_id, action, new_data)
    VALUES (
        'ledger',
        NEW.id,
        'INSERT',
        JSON_OBJECT(
            'id', NEW.id,
            'account_id', NEW.account_id,
            'amount', NEW.amount,
            'transaction_type', NEW.transaction_type,
            'reference_id', NEW.reference_id,
            'created_at', NEW.created_at
        )
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallet-db
  template:
    metadata:
      labels:
        app: wallet-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallet-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: WalletDB
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/mysql
            - name: schema-volume
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: wallet-db-pvc
        - name: schema-volume
          configMap:
            name: wallet-db-schema
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-db-service
spec:
  selector:
    app: wallet-db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
